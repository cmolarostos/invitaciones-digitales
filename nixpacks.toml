[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql",
           "php84Extensions.mbstring", "php84Extensions.tokenizer",
           "php84Extensions.xml", "php84Extensions.ctype",
           "php84Extensions.fileinfo", "php84Extensions.curl",
           "php84Extensions.zip", "php84Extensions.gd",
           "nodejs_22", "nodePackages.npm"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force && php -S 0.0.0.0:$PORT -t public"
