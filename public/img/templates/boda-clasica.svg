<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bg-boda" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff9f0"/>
      <stop offset="100%" stop-color="#fdf6ed"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c9a96e"/>
      <stop offset="50%"  stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="300" height="400" fill="url(#bg-boda)"/>

  <!-- Marco decorativo exterior -->
  <rect x="12" y="12" width="276" height="376" rx="2" fill="none"
        stroke="url(#gold)" stroke-width="0.8" stroke-dasharray="4,3"/>
  <rect x="18" y="18" width="264" height="364" rx="1" fill="none"
        stroke="#e8c97a" stroke-width="0.4" opacity="0.5"/>

  <!-- Ornamento superior central -->
  <text x="150" y="50" font-family="Georgia, serif" font-size="28" fill="#c9a96e"
        text-anchor="middle" opacity="0.8">❧</text>

  <!-- "Te invitamos a celebrar" -->
  <text x="150" y="78" font-family="Georgia, serif" font-size="8" fill="#b8956a"
        text-anchor="middle" letter-spacing="2.5">TE INVITAMOS A CELEBRAR</text>

  <!-- Línea dorada -->
  <line x1="60" y1="85" x2="240" y2="85" stroke="url(#gold)" stroke-width="0.6"/>

  <!-- Anillos entrelazados -->
  <circle cx="138" cy="118" r="22" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <circle cx="162" cy="118" r="22" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <!-- Diamante -->
  <polygon points="150,100 156,108 150,116 144,108" fill="#e8c97a" opacity="0.7"/>
  <polygon points="150,100 156,108 150,116 144,108" fill="none" stroke="white" stroke-width="0.8"/>

  <!-- Nombres -->
  <text x="150" y="162" font-family="Georgia, serif" font-size="22" font-style="italic"
        fill="#3d2b1f" text-anchor="middle">Ana &amp; Carlos</text>

  <!-- Línea separadora ornamentada -->
  <line x1="70"  y1="174" x2="125" y2="174" stroke="#c9a96e" stroke-width="0.7"/>
  <text x="150"  y="178" font-family="Georgia" font-size="9" fill="#c9a96e" text-anchor="middle">♦</text>
  <line x1="175" y1="174" x2="230" y2="174" stroke="#c9a96e" stroke-width="0.7"/>

  <!-- Fecha grande -->
  <text x="150" y="205" font-family="Georgia, serif" font-size="11" fill="#b8956a"
        text-anchor="middle" letter-spacing="1.5">SÁBADO</text>
  <text x="150" y="235" font-family="Georgia, serif" font-size="38" font-weight="300"
        fill="#3d2b1f" text-anchor="middle">14</text>
  <text x="150" y="255" font-family="Georgia, serif" font-size="13" fill="#c9a96e"
        text-anchor="middle" letter-spacing="1">Junio · 2026</text>

  <!-- Separador -->
  <line x1="60"  y1="268" x2="240" y2="268" stroke="url(#gold)" stroke-width="0.6"/>

  <!-- Lugar -->
  <text x="150" y="285" font-family="Georgia, serif" font-size="8.5" fill="#b8956a"
        text-anchor="middle" letter-spacing="2">EL LUGAR</text>
  <text x="150" y="302" font-family="Georgia, serif" font-size="12" font-style="italic"
        fill="#3d2b1f" text-anchor="middle">Hacienda San Rafael</text>
  <text x="150" y="316" font-family="Georgia, serif" font-size="8.5" fill="#8a7060"
        text-anchor="middle">Monterrey, Nuevo León</text>

  <!-- Vestimenta -->
  <rect x="80" y="328" width="140" height="22" rx="11"
        fill="none" stroke="#c9a96e" stroke-width="0.8"/>
  <text x="150" y="342" font-family="Georgia, serif" font-size="8.5" fill="#c9a96e"
        text-anchor="middle" letter-spacing="1">ETIQUETA FORMAL</text>

  <!-- Ornamento inferior -->
  <text x="150" y="382" font-family="Georgia, serif" font-size="18" fill="#c9a96e"
        text-anchor="middle" opacity="0.6">· · ·</text>
</svg>
