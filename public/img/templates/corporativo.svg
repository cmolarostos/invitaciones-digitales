<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bg-corp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#ebf4ff"/>
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#2a4a7f"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3182ce"/>
      <stop offset="100%" stop-color="#63b3ed"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="300" height="400" fill="url(#bg-corp)"/>

  <!-- Franja lateral izquierda -->
  <rect x="0" y="0" width="6" height="400" fill="url(#navy)"/>

  <!-- Header corporativo -->
  <rect x="0" y="0" width="300" height="100" fill="url(#navy)"/>

  <!-- Logo placeholder -->
  <rect x="24" y="22" width="36" height="36" rx="6" fill="white" opacity="0.15"/>
  <text x="42" y="47" font-family="Arial" font-size="16" font-weight="700"
        fill="white" text-anchor="middle">⬡</text>

  <!-- Nombre empresa -->
  <text x="70" y="36" font-family="Arial, sans-serif" font-size="11" font-weight="700"
        fill="white">TechCorp S.A.</text>
  <text x="70" y="50" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.6)"
        letter-spacing="0.5">Innovación · Excelencia</text>

  <!-- Tipo evento -->
  <text x="24" y="80" font-family="Arial, sans-serif" font-size="17" font-weight="700"
        fill="white">Conferencia Anual 2026</text>
  <rect x="24" y="86" width="80" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Línea accent separadora -->
  <rect x="0" y="100" width="300" height="3" fill="url(#accent-line)"/>

  <!-- Contenido -->
  <!-- Fecha destacada -->
  <rect x="24" y="118" width="252" height="58" rx="8" fill="white"
        stroke="#bee3f8" stroke-width="1"/>
  <rect x="24" y="118" width="58" height="58" rx="8" fill="url(#navy)"/>
  <!-- Mes -->
  <text x="53" y="136" font-family="Arial" font-size="8" font-weight="600"
        fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1">NOV</text>
  <!-- Día -->
  <text x="53" y="162" font-family="Arial" font-size="26" font-weight="700"
        fill="white" text-anchor="middle">18</text>

  <text x="105" y="136" font-family="Arial" font-size="8" fill="#718096"
        letter-spacing="0.5">FECHA</text>
  <text x="105" y="152" font-family="Arial" font-size="11" font-weight="600"
        fill="#1a202c">Miércoles, 18 de Noviembre</text>
  <text x="105" y="166" font-family="Arial" font-size="9" fill="#718096">9:00 AM — 6:00 PM</text>

  <!-- Separador -->
  <line x1="24" y1="188" x2="276" y2="188" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Ubicación -->
  <text x="24" y="206" font-family="Arial" font-size="8" font-weight="600"
        fill="#3182ce" letter-spacing="1">UBICACIÓN</text>
  <text x="24" y="221" font-family="Arial" font-size="11" font-weight="600"
        fill="#1a202c">Centro de Convenciones Norte</text>
  <text x="24" y="235" font-family="Arial" font-size="9" fill="#718096">
    Av. Constitución 400, Monterrey, NL
  </text>

  <!-- Botón Ver mapa -->
  <rect x="24" y="244" width="80" height="22" rx="4" fill="none"
        stroke="#3182ce" stroke-width="1"/>
  <text x="64" y="258" font-family="Arial" font-size="8" fill="#3182ce"
        text-anchor="middle" font-weight="500">📍 Ver mapa</text>

  <!-- Separador -->
  <line x1="24" y1="278" x2="276" y2="278" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Agenda / Ponentes simulados -->
  <text x="24" y="296" font-family="Arial" font-size="8" font-weight="600"
        fill="#3182ce" letter-spacing="1">AGENDA HIGHLIGHTS</text>

  <!-- Item 1 -->
  <rect x="24" y="304" width="4" height="28" rx="2" fill="#3182ce"/>
  <text x="36" y="315" font-family="Arial" font-size="8.5" font-weight="600" fill="#1a202c">9:00 AM — Keynote de apertura</text>
  <text x="36" y="327" font-family="Arial" font-size="7.5" fill="#718096">Dr. María González · CEO TechCorp</text>

  <!-- Item 2 -->
  <rect x="24" y="338" width="4" height="28" rx="2" fill="#63b3ed"/>
  <text x="36" y="349" font-family="Arial" font-size="8.5" font-weight="600" fill="#1a202c">2:00 PM — Panel de innovación</text>
  <text x="36" y="361" font-family="Arial" font-size="7.5" fill="#718096">Líderes del sector tecnológico</text>

  <!-- CTA -->
  <rect x="24" y="374" width="252" height="16" rx="4" fill="url(#navy)"/>
  <text x="150" y="385" font-family="Arial" font-size="8" font-weight="600"
        fill="white" text-anchor="middle" letter-spacing="0.5">CONFIRMAR ASISTENCIA →</text>
</svg>
