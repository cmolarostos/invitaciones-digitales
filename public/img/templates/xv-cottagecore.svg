<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <pattern id="paper" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#fef9f0"/>
      <circle cx="1" cy="1" r="0.4" fill="#e8e0d0" opacity="0.4"/>
      <circle cx="3" cy="3" r="0.4" fill="#e8e0d0" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Fondo textura papel -->
  <rect width="300" height="400" fill="#fef9f0"/>
  <rect width="300" height="400" fill="url(#paper)"/>
  <rect width="300" height="400" fill="none" stroke="rgba(135,168,120,0.25)" stroke-width="1"/>

  <!-- Blobs de fondo -->
  <circle cx="0"   cy="400" r="60" fill="#f5c2c7" opacity="0.18"/>
  <circle cx="300" cy="0"   r="60" fill="#87a878" opacity="0.10"/>

  <!-- Hojas CSS simuladas -->
  <!-- Top left -->
  <ellipse cx="22"  cy="22"  rx="18" ry="9"  fill="#87a878" opacity="0.55" transform="rotate(45,22,22)"/>
  <ellipse cx="12"  cy="38"  rx="14" ry="7"  fill="#87a878" opacity="0.45" transform="rotate(-12,12,38)"/>
  <!-- Top right -->
  <ellipse cx="278" cy="22"  rx="18" ry="9"  fill="#87a878" opacity="0.55" transform="rotate(-45,278,22)"/>
  <!-- Bottom left -->
  <ellipse cx="22"  cy="378" rx="18" ry="9"  fill="#87a878" opacity="0.45" transform="rotate(-45,22,378)"/>
  <!-- Bottom right -->
  <ellipse cx="278" cy="378" rx="18" ry="9"  fill="#87a878" opacity="0.45" transform="rotate(45,278,378)"/>

  <!-- Encabezado -->
  <text x="150" y="52" font-family="Georgia,serif" font-size="7.5" fill="#d68c7a"
        text-anchor="middle" letter-spacing="3" text-transform="uppercase">MIS QUINCE AÑOS</text>

  <!-- Foto circular placeholder -->
  <circle cx="150" cy="110" r="44" fill="#f5c2c7" opacity="0.4"/>
  <circle cx="150" cy="110" r="44" fill="none" stroke="#f5c2c7" stroke-width="2"/>
  <!-- Silueta -->
  <ellipse cx="150" cy="114" rx="22" ry="26" fill="#d68c7a" opacity="0.4"/>
  <circle  cx="150" cy="91"  r="12"          fill="#d68c7a" opacity="0.45"/>

  <!-- Nombre -->
  <text x="150" y="175" font-family="Georgia,serif" font-size="30" font-style="italic"
        fill="#87a878" text-anchor="middle" font-weight="400">Sofía</text>

  <!-- Ornamento SVG floral -->
  <path d="M90 197 C110 187 120 207 150 197 C180 187 190 207 210 197"
        stroke="#f5c2c7" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <circle cx="150" cy="197" r="3.5" fill="#d68c7a"/>
  <path d="M145 193 C142 188 148 186 150 190 M155 193 C158 188 152 186 150 190"
        stroke="#87a878" stroke-width="1.2" fill="none"/>

  <!-- Card fecha -->
  <rect x="50" y="210" width="200" height="46" rx="23"
        fill="rgba(245,194,199,0.18)" stroke="rgba(245,194,199,0.5)" stroke-width="1"/>
  <text x="150" y="232" font-family="Georgia,serif" font-size="12" fill="#87a878"
        text-anchor="middle" font-weight="300">Domingo, 5 de Julio</text>
  <text x="150" y="248" font-family="Georgia,serif" font-size="10" fill="#87a878"
        text-anchor="middle" letter-spacing="3">2026</text>

  <!-- Cuenta regresiva -->
  <text x="70"  y="278" font-family="Georgia,serif" font-size="20" font-style="italic" fill="#d68c7a" text-anchor="middle">45</text>
  <text x="120" y="278" font-family="Georgia,serif" font-size="20" font-style="italic" fill="#d68c7a" text-anchor="middle">12</text>
  <text x="180" y="278" font-family="Georgia,serif" font-size="20" font-style="italic" fill="#d68c7a" text-anchor="middle">30</text>
  <text x="230" y="278" font-family="Georgia,serif" font-size="20" font-style="italic" fill="#d68c7a" text-anchor="middle">08</text>
  <text x="70"  y="289" font-family="Arial" font-size="7" fill="#87a878" text-anchor="middle" letter-spacing="1">DÍAS</text>
  <text x="120" y="289" font-family="Arial" font-size="7" fill="#87a878" text-anchor="middle" letter-spacing="1">HORAS</text>
  <text x="180" y="289" font-family="Arial" font-size="7" fill="#87a878" text-anchor="middle" letter-spacing="1">MIN</text>
  <text x="230" y="289" font-family="Arial" font-size="7" fill="#87a878" text-anchor="middle" letter-spacing="1">SEG</text>

  <!-- Lugar -->
  <text x="150" y="314" font-family="Georgia,serif" font-size="15" font-style="italic"
        fill="#d68c7a" text-anchor="middle">Jardín Villa Rosa</text>
  <text x="150" y="329" font-family="Arial,sans-serif" font-size="9" fill="#87a878"
        text-anchor="middle" font-weight="300">Guadalajara, Jalisco · 7:00 PM</text>

  <!-- Ornamento inferior invertido -->
  <path d="M110 344 C120 349 130 339 150 344 C170 349 180 339 190 344"
        stroke="#f5c2c7" stroke-width="1.5" fill="none" stroke-linecap="round"
        transform="rotate(180,150,344)"/>

  <!-- Cita -->
  <text x="150" y="366" font-family="Georgia,serif" font-size="7.5" font-style="italic"
        fill="#87a878" text-anchor="middle" opacity="0.75">"Bajo la sombra de los árboles...</text>
  <text x="150" y="377" font-family="Georgia,serif" font-size="7.5" font-style="italic"
        fill="#87a878" text-anchor="middle" opacity="0.75">celebremos juntos este inicio."</text>

  <!-- Botón confirmar -->
  <rect x="90" y="383" width="120" height="12" rx="6"
        fill="none" stroke="#d68c7a" stroke-width="0.8"/>
  <text x="150" y="392" font-family="Arial" font-size="6" fill="#d68c7a"
        text-anchor="middle" letter-spacing="1">CONFIRMAR ASISTENCIA</text>
</svg>
